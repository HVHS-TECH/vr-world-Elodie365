    <body>
    <a-scene>
      <a-sky color="darkblue"></a-sky>
      
       <!-- Put this inside the <a-scene> -->
      <a-entity 
      ply-model="src:pony.ply"
      rotation="-90 0 90"
      position="-17.829 0.875 13.515"
      animation__first="
      property: position;
      from: -17.829 0.875 13.515;
      to: -13.525 1.315 13.724;
      dur: 10000; 
      startEvents: loaded"
      
      animation__second="
      property: rotation;
      to: -90 -90 0;
      dur: 2000;

      animation__third="

      from: -13.525 1.315 13.724;
      to: -17.829 0.875 13.515;
      dur:5000;
